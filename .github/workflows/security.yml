name: Security

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC (6am CST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bearer:
    name: SAST scan (Bearer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan source code (SARIF)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${PWD}:/repo" \
            bearer/bearer:latest \
            scan /repo --format sarif --output /repo/bearer.sarif
      - name: Upload Bearer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bearer.sarif
          category: bearer-source
      - name: Enforce Bearer findings policy
        run: |
          FINDINGS=$(jq '[.runs[].results[]? | select(.level == "error" or .level == "warning")] | length' bearer.sarif)
          echo "Bearer findings (warning/error): ${FINDINGS}"
          if [ "${FINDINGS}" -gt 0 ]; then
            echo "::error::Bearer reported security findings."
            exit 1
          fi

  trivy:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem (SARIF)
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          exit-code: "0"
      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
      - name: Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"

  semgrep:
    name: SAST scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Scan source code (SARIF)
        run: semgrep scan --config p/security-audit --sarif --output semgrep.sarif .
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-source
      - name: Scan source code (blocking)
        run: semgrep scan --config p/security-audit --error .
