name: Security

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC (6am CST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bearer:
    name: SAST scan (Bearer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan source code (SARIF)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${PWD}:/repo" \
            bearer/bearer:latest \
            scan /repo --format sarif --output /repo/bearer.sarif \
            --exit-code 0
      - name: Upload Bearer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bearer.sarif
          category: bearer-source
      - name: Enforce Bearer findings policy
        run: |
          FINDINGS=$(jq '[.runs[].results[]? | select(.level == "error" or .level == "warning")] | length' bearer.sarif)
          echo "Bearer findings (warning/error): ${FINDINGS}"
          if [ "${FINDINGS}" -gt 0 ]; then
            echo "::error::Bearer reported security findings."
            exit 1
          fi

  trivy:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Scan filesystem (SARIF)
        run: trivy fs --format sarif --output trivy-fs.sarif .
      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
      - name: Scan filesystem for vulnerabilities
        run: trivy fs --severity CRITICAL,HIGH,MEDIUM --exit-code 1 .

  semgrep:
    name: SAST scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Scan source code (SARIF)
        run: semgrep scan --config p/security-audit --sarif --output semgrep.sarif .
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-source
      - name: Scan source code (blocking)
        run: semgrep scan --config p/security-audit --error .
