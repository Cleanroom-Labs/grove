name: Build All Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/build-all-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/build-all-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    name: Validate docs tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure docs markdown files are present
        run: |
          test -d docs
          find docs -type f -name '*.md' | grep -q .

